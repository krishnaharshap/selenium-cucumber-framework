# Browser Configuration
browser=chrome
headless=false

# Application URL
url=https://www.saucedemo.com/

# Wait Times (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Test Data
valid.username=standard_user
valid.password=secret_sauce
locked.username=locked_out_user
problem.username=problem_user

# Reporting
take.screenshot.on.failure=true
extent.report.name=TestExecutionReport
allure.report.name=AllureReport

# Environment
environment=QA
test.execution.platform=Web
tester.name=QA Automation Team
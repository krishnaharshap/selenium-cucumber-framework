name: Full Regression Suite

on:
  schedule:
    - cron: '0 0 * * *'   # nightly at midnight UTC
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tag filter (e.g. @Regression, @E2E, @Smoke)'
        required: false
        default: '@Regression'
      browser:
        description: 'Browser to run against'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

permissions:
  contents: read

jobs:
  regression:
    name: Regression – ${{ inputs.browser || 'chrome' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version
          google-chrome --version || true
          firefox --version || true

      - name: Run full regression
        run: >
          mvn -B -ntp test
          -Dbrowser=${{ inputs.browser || 'chrome' }}
          -Dheadless=true
          "-Dcucumber.filter.tags=${{ inputs.tags || '@Regression' }}"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-${{ inputs.browser || 'chrome' }}-${{ github.run_number }}
          path: |
            target/surefire-reports/
            target/allure-results/
            test-output/cucumber-reports/
            test-output/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Report summary
        if: always()
        run: |
          echo "### Regression Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Browser: ${{ inputs.browser || 'chrome' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag filter: ${{ inputs.tags || '@Regression' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/TestSuite.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat target/surefire-reports/TestSuite.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

name: CI - Maven Java Tests

# Run on pushes and pull requests to develop & main
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Cache Maven dependencies for faster runs
      - name: Set up Java & Cache Maven Dependencies
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Display environment info (optional, helps debug)
      - name: Show environment info
        run: |
          java -version
          mvn -version

      # 4. Build and run tests
      - name: Build with Maven
        run: mvn clean test --batch-mode

      # 5. Upload test results/artifacts (optional)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/*.xml
            **/target/*.html
            **/target/cucumber-reports/
            **/target/allure-results/

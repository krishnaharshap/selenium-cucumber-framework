name: API Tests (Phase 2)

# Runs API tests independently from the UI smoke suite.
# No browser needed — runs headless Java only.
on:
  push:
    branches:
      - feat/api-scaffold
      - develop
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/test/resources/features/ApiTesting.feature'
      - 'src/test/java/com/automation/stepdefinitions/ApiSteps.java'
      - 'src/test/java/com/automation/context/ApiContext.java'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-tests:
    name: REST API Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run API tests
        run: >
          mvn -B -ntp test
          "-Dcucumber.filter.tags=@API"

      - name: Upload API test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: |
            target/surefire-reports/
            target/allure-results/
            test-output/cucumber-reports/
          if-no-files-found: ignore

name: Publish Allure Report → GitHub Pages

# Triggered after the main CI smoke tests complete, or manually.
# Free GitHub Pages hosting — report URL: https://krishnaharshap.github.io/selenium-cucumber-framework/
on:
  workflow_run:
    workflows: ["CI - Maven Smoke Tests"]
    branches: [main, develop]
    types: [completed]
  workflow_dispatch:
  push:
    branches: [main, develop]

permissions:
  contents: write    # needed to push to gh-pages branch

jobs:
  allure-report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    # Run even when CI failed so we can see failure details in the report
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion != 'cancelled' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run smoke tests (results only)
        run: >
          mvn -B -ntp test
          -Dbrowser=chrome
          -Dheadless=true
          "-Dcucumber.filter.tags=@Smoke"
        continue-on-error: true

      - name: Fetch existing Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            echo "Restoring history from previous deployment"
            cp -r gh-pages/history target/allure-results/history
          else
            echo "No previous history found — first run"
          fi
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline@2.27.0

      - name: Generate Allure Report
        if: always()
        run: allure generate target/allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          commit_message: "chore: update Allure report [skip ci]"

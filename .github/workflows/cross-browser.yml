name: Cross-Browser Smoke Tests

on:
  push:
    branches:
      - main
      - develop
      - "fix/**"
      - "feat/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test (leave empty to run all)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  cross-browser:
    name: Smoke – ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false          # keep remaining browsers running if one fails
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Show browser version
        run: |
          if [ "${{ matrix.browser }}" = "chrome" ]; then
            google-chrome --version || true
          elif [ "${{ matrix.browser }}" = "firefox" ]; then
            firefox --version || true
          fi

      - name: Run smoke tests – ${{ matrix.browser }}
        run: >
          mvn -B -ntp test
          -Dbrowser=${{ matrix.browser }}
          -Dheadless=true
          "-Dcucumber.filter.tags=@Smoke"

      - name: Upload ${{ matrix.browser }} test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/allure-results/
            test-output/cucumber-reports/
            test-output/screenshots/
          if-no-files-found: ignore
